<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1d1712; --bg2:#221b15; --ink:#f1e3d0; --muted:#9a8a72;
    --dim:#7d6f5c; --gold:#e8b85a; --gold2:#c9a35e; --ember:#e8503a; --ember2:#c93820;
    --line:rgba(201,163,94,.18); --serif:'Noto Serif TC','Noto Serif JP',serif;
    --mincho:'Shippori Mincho','Noto Serif TC',serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:#17120e;font-family:var(--serif);color:var(--ink);}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;overflow-x:hidden;}
  .glow{position:fixed;inset:0;max-width:480px;margin:0 auto;pointer-events:none;opacity:.6;z-index:0;
    background:radial-gradient(120% 60% at 50% 0%, rgba(214,90,32,.18), transparent 60%),
               radial-gradient(80% 40% at 50% 100%, rgba(180,40,30,.12), transparent 70%);}

  header{position:relative;z-index:1;text-align:center;padding:26px 20px 16px;border-bottom:1px solid var(--line);}
  .ko{font-size:11px;letter-spacing:.5em;color:var(--gold2);margin-bottom:8px;}
  h1{margin:0;font-family:var(--mincho);font-size:38px;color:var(--ember);text-shadow:0 2px 12px rgba(214,90,32,.4);}
  .en{font-size:10px;letter-spacing:.3em;color:var(--muted);margin-top:8px;}
  .guests{margin-top:14px;display:inline-flex;align-items:center;gap:12px;padding:6px 16px;border-radius:999px;
    background:rgba(0,0,0,.3);border:1px solid rgba(201,163,94,.3);}
  .guests span.lbl{font-size:12px;color:var(--gold2);}
  .guests b{width:20px;text-align:center;}
  .gbtn{width:26px;height:26px;border-radius:50%;border:none;background:rgba(201,163,94,.15);color:var(--ink);font-size:15px;cursor:pointer;}

  .modebar{position:relative;z-index:1;display:flex;gap:8px;padding:12px 16px 0;}
  .modebar button{flex:1;padding:11px 0;border:1px solid var(--line);border-radius:12px 12px 0 0;border-bottom:none;
    background:rgba(0,0,0,.2);color:var(--muted);font-family:var(--serif);font-size:15px;cursor:pointer;position:relative;}
  .modebar button.active{background:rgba(232,80,58,.12);border-color:rgba(232,80,58,.4);color:var(--ember);font-weight:700;}
  .modebar .mbadge{margin-left:6px;font-size:11px;padding:1px 7px;border-radius:999px;background:var(--ember);color:#fff;}

  nav{position:sticky;top:0;z-index:20;display:flex;flex-wrap:nowrap;overflow-x:auto;background:rgba(29,23,18,.94);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  nav::-webkit-scrollbar{display:none;}
  nav button{flex:0 0 auto;padding:13px 15px;border:none;background:none;color:var(--muted);font-family:var(--serif);
    font-size:14px;cursor:pointer;position:relative;white-space:nowrap;}
  nav button.active{color:var(--ember);font-weight:700;}
  nav button.active::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--ember);}
  nav .badge{position:absolute;top:5px;right:4px;min-width:16px;height:16px;border-radius:999px;
    background:var(--ember);color:#fff;font-size:9px;line-height:16px;padding:0 3px;}

  main{position:relative;z-index:1;padding:16px 16px 140px;}
  .subhead{font-size:13px;color:var(--gold2);margin:18px 0 10px;letter-spacing:.04em;display:flex;align-items:center;gap:8px;}
  .subhead:first-child{margin-top:0;}
  .subhead::before{content:"";width:10px;height:10px;flex:0 0 auto;background:
    linear-gradient(45deg,var(--gold2) 25%,transparent 25%,transparent 75%,var(--gold2) 75%),
    linear-gradient(45deg,var(--gold2) 25%,transparent 25%,transparent 75%,var(--gold2) 75%);
    background-size:5px 5px;background-position:0 0,2.5px 2.5px;opacity:.7;}
  .card{border-radius:12px;padding:14px;display:flex;gap:12px;margin-bottom:10px;
    background:rgba(0,0,0,.22);border:1px solid rgba(201,163,94,.14);transition:.2s;}
  .card.on{background:rgba(232,80,58,.08);border-color:rgba(232,80,58,.4);}
  .num{font-size:17px;color:var(--gold2);padding-top:2px;min-width:22px;}
  .body{flex:1;min-width:0;}
  .nm{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .nm h3{margin:0;font-size:16px;font-weight:600;color:var(--ink);line-height:1.25;}
  .tag{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(201,163,94,.2);color:var(--gold2);white-space:nowrap;}
  .ja{font-size:11px;color:var(--dim);margin-top:2px;}
  .desc{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4;}
  .row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
  .price{font-family:var(--mincho);font-size:18px;font-weight:600;color:var(--gold);}
  .price small{font-size:10px;color:var(--muted);margin-left:3px;}
  .add{padding:6px 16px;border-radius:999px;border:none;background:var(--ember);color:#fff;font-size:14px;font-weight:600;font-family:var(--serif);cursor:pointer;}
  .add:active{transform:scale(.95);}
  .stepper{display:flex;align-items:center;gap:12px;}
  .step{width:32px;height:32px;border-radius:50%;border:none;font-size:18px;cursor:pointer;}
  .step.minus{background:rgba(201,163,94,.18);color:var(--ink);}
  .step.plus{background:var(--ember);color:#fff;}
  .step:active{transform:scale(.9);}
  .qty{width:20px;text-align:center;font-size:18px;font-weight:600;color:var(--gold);}
  /* 杯/瓶 變體 */
  .variants{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
  .vrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px;border-radius:9px;
    background:rgba(201,163,94,.07);border:1px solid rgba(201,163,94,.12);}
  .vrow.on{background:rgba(232,80,58,.1);border-color:rgba(232,80,58,.35);}
  .vleft{display:flex;align-items:baseline;gap:6px;min-width:0;}
  .vlabel{font-size:13px;color:var(--ink);}
  .vja{font-size:10px;color:var(--dim);}
  .vprice{font-family:var(--mincho);font-size:15px;color:var(--gold);margin-left:auto;padding:0 8px;white-space:nowrap;}
  .add.sm{padding:4px 12px;font-size:13px;}
  .step.sm{width:26px;height:26px;font-size:15px;}
  .stepper.sm{gap:8px;}
  .footnote{font-size:10px;text-align:center;color:#6d6150;margin-top:24px;line-height:1.7;}
  .footnote .ig{color:var(--gold2);}

  .checkout{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;z-index:30;padding:12px 16px 16px;
    background:linear-gradient(to top,#1d1712 70%,rgba(29,23,18,0));display:none;}
  .checkout.show{display:block;}
  .cbtn{width:100%;border:none;border-radius:16px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(135deg,var(--ember),var(--ember2));box-shadow:0 8px 24px rgba(232,80,58,.35);cursor:pointer;}
  .cbtn:active{transform:scale(.98);}
  .cbtn .l{display:flex;align-items:center;gap:8px;}
  .cbtn .cnt{width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.25);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .cbtn .ltxt{color:#fff;font-weight:600;font-size:15px;}
  .cbtn .tot{color:#fff;font-weight:700;font-size:20px;font-family:var(--mincho);}

  .sheet-mask{position:fixed;inset:0;max-width:480px;margin:0 auto;z-index:40;background:rgba(0,0,0,.6);display:none;align-items:flex-end;}
  .sheet-mask.show{display:flex;}
  .sheet{width:100%;background:var(--bg2);border:1px solid rgba(201,163,94,.2);border-radius:24px 24px 0 0;max-height:88vh;overflow-y:auto;}
  .shead{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:16px 20px;}
  .shead h2{margin:0;flex:1;font-family:var(--mincho);font-size:20px;color:var(--gold);}
  .x{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;}
  .oitems{padding:12px 20px;}
  .ocat{font-size:11px;color:var(--gold2);margin:10px 0 4px;letter-spacing:.1em;}
  .oitem{display:flex;align-items:center;gap:8px;padding:6px 0;}
  .oitem .on-num{color:var(--gold2);font-size:13px;}
  .oitem .oinfo{flex:1;min-width:0;}
  .oitem .oinfo .t{font-size:14px;color:var(--ink);}
  .oitem .oinfo .s{font-size:10px;color:var(--dim);}
  .oitem .op{font-size:14px;font-weight:600;color:var(--gold);white-space:nowrap;}
  .om{width:24px;height:24px;border-radius:50%;border:none;font-size:14px;cursor:pointer;}
  .om.minus{background:rgba(201,163,94,.15);color:var(--ink);}
  .om.plus{background:rgba(232,80,58,.85);color:#fff;}
  .totals{padding:12px 20px;border-top:1px solid var(--line);}
  .tline{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-bottom:4px;}
  .tgrand{display:flex;justify-content:space-between;font-family:var(--mincho);font-size:24px;font-weight:700;color:var(--gold);padding-top:4px;}
  .note{font-size:10px;color:var(--dim);}

  .staff{margin:8px 16px 24px;border-radius:16px;padding:16px;background:rgba(0,0,0,.3);border:1px dashed rgba(201,163,94,.35);}
  .staff .title{font-size:12px;font-weight:600;color:var(--gold2);margin-bottom:10px;}
  .srow{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;font-size:14px;color:#e6dccb;margin-bottom:6px;}
  .srow .sn{color:var(--gold);}
  .srow .sq{font-weight:700;color:var(--gold);white-space:nowrap;}
  .sfoot{font-size:11px;color:var(--dim);margin-top:10px;padding-top:8px;border-top:1px solid rgba(201,163,94,.15);line-height:1.6;}
</style>
</head>

<div class="app">

    </div>
  </header>

  <div class="modebar" id="modebar"></div>
  <nav id="nav"></nav>
  <main id="list"></main>

  <div class="checkout" id="checkout">
    <button class="cbtn" onclick="openSheet()">
      <span class="l"><span class="cnt" id="cCount">0</span><span class="ltxt">查看訂單</span></span>
      <span class="tot" id="cTotal">¥0</span>

    <div class="sheet" id="sheet"></div>
  </div>
</div>

const MENUS={food:MENU_FOOD,drink:MENU_DRINK};
const MODE_LABEL={food:"🍖 餐點",drink:"🍺 飲料"};
const CAT_ICON={food:"🍖",drink:"🍺"};

function flatten(menu,cat){return Object.values(menu).flatMap(t=>t.groups.flatMap(g=>g.items.map(it=>({...it,cat}))));}
const ALL=[...flatten(MENU_FOOD,"food"),...flatten(MENU_DRINK,"drink")];
const uidOf=it=>it.cat[0]+it.id;
const byUid=u=>ALL.find(it=>uidOf(it)===u);

let cart={};            // { key: qty }  key = uid 或 uid#variantIdx
let mode="food", tab="sets", guests=2;

function lineInfo(key){
  const [base,vi]=key.split("#");
  const it=byUid(base);
  if(vi!==undefined){const v=it.variants[+vi];return{it,v,price:v.price,from:false};}
  return{it,v:null,price:it.price,from:!!it.from};
}
function setLine(key,q){ if(q<=0)delete cart[key]; else cart[key]=q; render(); }
function changeGuests(d){ guests=Math.max(1,guests+d); document.getElementById("guestNum").textContent=guests; renderSheet(); }
function openSheet(){ renderSheet(); document.getElementById("mask").classList.add("show"); }
function closeSheet(){ document.getElementById("mask").classList.remove("show"); }

function totals(){let total=0,count=0,from=false;
  for(const[k,q]of Object.entries(cart)){const li=lineInfo(k);total+=li.price*q;count+=q;if(li.from)from=true;}
  return{total,count,from};}
function modeCount(m){let c=0;for(const[k,q]of Object.entries(cart)){if(byUid(k.split("#")[0]).cat===m)c+=q;}return c;}
function tabCount(m,tk){
  const set=new Set(MENUS[m][tk].groups.flatMap(g=>g.items.map(it=>m[0]+it.id)));
  let c=0;for(const[k,q]of Object.entries(cart)){if(set.has(k.split("#")[0]))c+=q;}return c;}

function renderModebar(){
  document.getElementById("modebar").innerHTML=Object.keys(MENUS).map(m=>{
    const c=modeCount(m);
    return `<button class="${mode===m?'active':''}" onclick="setMode('${m}')">${MODE_LABEL[m]}${c?`<span class="mbadge">${c}</span>`:''}</button>`;
  }).join("");
}
function setMode(m){ mode=m; tab=Object.keys(MENUS[m])[0]; render(); window.scrollTo({top:0}); }

function renderNav(){
  document.getElementById("nav").innerHTML=Object.entries(MENUS[mode]).map(([k,s])=>{
    const c=tabCount(mode,k);
    return `<button class="${tab===k?'active':''}" onclick="selectTab('${k}')">${s.label}${c?`<span class="badge">${c}</span>`:''}</button>`;
  }).join("");
}
function selectTab(k){ tab=k; render(); document.querySelector('main').scrollIntoView({block:'start'}); }

function addBtn(key,sm){return `<button class="add${sm?' sm':''}" onclick="setLine('${key}',1)">加入</button>`;}
function stepper(key,q,sm){return `<div class="stepper${sm?' sm':''}">
  <button class="step minus${sm?' sm':''}" onclick="setLine('${key}',${q-1})">−</button>
  <span class="qty">${q}</span>
  <button class="step plus${sm?' sm':''}" onclick="setLine('${key}',${q+1})">＋</button></div>`;}

function itemCard(it){
  const u=mode[0]+it.id;
  if(it.variants){
    const anyOn=it.variants.some((_,i)=>cart[u+"#"+i]);
    const rows=it.variants.map((v,i)=>{
      const key=u+"#"+i,q=cart[key]||0;
      return `<div class="vrow ${q?'on':''}">
        <div class="vleft"><span class="vlabel">${v.zh}</span><span class="vja">${v.label}</span></div>
        <span class="vprice">${yen(v.price)}</span>
        ${q?stepper(key,q,true):addBtn(key,true)}</div>`;}).join("");
    return `<div class="card ${anyOn?'on':''}">
      <div class="num">${circle(it.id)}</div>
      <div class="body">
        <div class="nm"><h3>${it.zh}</h3></div>
        <div class="ja">${it.ja}</div>
        ${it.desc?`<div class="desc">${it.desc}</div>`:''}
        <div class="variants">${rows}</div>
      </div></div>`;
  }
  const q=cart[u]||0;
  return `<div class="card ${q?'on':''}">
    <div class="num">${circle(it.id)}</div>
    <div class="body">
      <div class="nm"><h3>${it.zh}</h3>${it.tag?`<span class="tag">${it.tag}</span>`:''}</div>
      <div class="ja">${it.ja}</div>
      ${it.desc?`<div class="desc">${it.desc}</div>`:''}
      <div class="row">
        <span class="price">${it.from?'¥2,300〜':yen(it.price)}${it.perGuest?'<small>/位</small>':''}</span>
        ${q?stepper(u,q):addBtn(u)}
      </div>
    </div></div>`;
}

function renderList(){
  const sec=MENUS[mode][tab];
  const html=sec.groups.map(g=>`<p class="subhead">${g.sub}</p>`+g.items.map(itemCard).join("")).join("");
  document.getElementById("list").innerHTML=html+
    `<p class="footnote">※ 圖片僅供參考　※ 標示價格均已含消費稅<br><span class="ig">📷 @RYUGUEN_MIYAKO</span></p>`;
}

function renderCheckout(){
  const{total,count,from}=totals();
  document.getElementById("checkout").classList.toggle("show",count>0);
  document.getElementById("cCount").textContent=count;
  document.getElementById("cTotal").textContent=yen(total)+(from?"〜":"");
}

function sortedEntries(){
  return Object.entries(cart).sort((a,b)=>{
    const A=byUid(a[0].split("#")[0]),B=byUid(b[0].split("#")[0]);
    if(A.cat!==B.cat)return A.cat==="food"?-1:1;
    return A.id-B.id;
  });
}

function renderSheet(){
  const{total,from}=totals();
  const entries=sortedEntries();
  if(entries.length===0){closeSheet();return;}
  let lastCat=null,lines="";
  for(const[key,q]of entries){
    const{it,v,price}=lineInfo(key);
    if(it.cat!==lastCat){lastCat=it.cat;lines+=`<div class="ocat">${MODE_LABEL[it.cat]}</div>`;}
    const vlbl=v?` <span class="vja">・${v.zh}${v.label}</span>`:'';
    lines+=`<div class="oitem">
      <span class="on-num">${circle(it.id)}</span>
      <div class="oinfo"><div class="t">${it.zh}${vlbl}</div><div class="s">${yen(price)} × ${q}</div></div>
      <span class="op">${yen(price*q)}</span>
      <button class="om minus" onclick="setLine('${key}',${q-1})">−</button>
      <button class="om plus" onclick="setLine('${key}',${q+1})">＋</button></div>`;
  }
  let lastCat2=null,staff="";
  for(const[key,q]of entries){
    const{it,v}=lineInfo(key);
    const vlbl=v?`（${v.label}）`:'';
    staff+=`<div class="srow"><span><span class="sn">${CAT_ICON[it.cat]}${circle(it.id)}</span> ${it.ja}${vlbl}</span><span class="sq">× ${q}</span></div>`;
  }
  document.getElementById("sheet").innerHTML=`
    <div class="shead"><h2>我的訂單</h2><button class="x" onclick="closeSheet()">✕</button></div>
    <div class="oitems">${lines}</div>
    <div class="totals">
      <div class="tline"><span>合計（含稅）</span><span>${yen(total)}${from?'〜':''}</span></div>
      <div class="tline"><span>${guests} 人均攤</span><span>約 ${yen(Math.round(total/guests))}${from?'〜':''} /人</span></div>
      <div class="tgrand"><span>總計</span><span>${yen(total)}${from?'〜':''}</span></div>
      ${from?'<p class="note">※ ⑬稀有部位為起價，實際依當日報價</p>':''}
    </div>
    <div class="staff">
      <div class="title">📋 給店員看 ・ ご注文リスト</div>
      ${staff}
      <p class="sfoot">すみません、こちらを注文お願いします。<br>（不好意思，我要點這些）</p>
    </div>`;
}

function render(){ renderModebar(); renderNav(); renderList(); renderCheckout();
  if(document.getElementById("mask").classList.contains("show")) renderSheet(); }

render();
</script>
